name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write   # required for OIDC token
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: us-east-1

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          role-session-name: nullrod-ui-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Read deployment params
        run: |
          echo "BUCKET_NAME=$(aws ssm get-parameter \
            --name /nullrod/ui/bucket-name \
            --query Parameter.Value --output text)" >> "$GITHUB_ENV"
          echo "DISTRIBUTION_ID=$(aws ssm get-parameter \
            --name /nullrod/ui/distribution-id \
            --query Parameter.Value --output text)" >> "$GITHUB_ENV"

      - name: Sync assets to S3
        run: |
          # Long-lived cache for hashed assets (JS/CSS bundles).
          aws s3 sync dist/assets/ "s3://${BUCKET_NAME}/assets/" \
            --delete \
            --cache-control "public,max-age=31536000,immutable"

          # No-cache for index.html so browsers always fetch the latest shell.
          aws s3 cp dist/index.html "s3://${BUCKET_NAME}/index.html" \
            --cache-control "no-cache,no-store,must-revalidate" \
            --content-type "text/html"

          # Sync everything else (favicon, manifest, etc.) with short TTL.
          aws s3 sync dist/ "s3://${BUCKET_NAME}/" \
            --delete \
            --exclude "assets/*" \
            --exclude "index.html" \
            --cache-control "public,max-age=3600"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${DISTRIBUTION_ID}" \
            --paths "/*"
